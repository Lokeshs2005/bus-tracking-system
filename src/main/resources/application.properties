# Server Port Configuration
server.port=8080

# Application Name
spring.application.name=ecommerce

# Thymeleaf Caching (Disable in dev for immediate UI reload)
spring.thymeleaf.cache=false

# -------------------------------------------------------------
# DATABASE CONFIGURATION
# Default: File-based H2 Database (persisted in ./data directory)
# -------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Web Console Configuration (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# Multipart File Upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

